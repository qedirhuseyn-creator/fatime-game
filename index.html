<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fatimə – Rəqəmlər</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(180deg,#0f1e3d,#081225);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 90%;
      max-width: 400px;
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,.4);
      text-align: center;
    }

    .top {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 20px;
      opacity: .9;
    }

    #question {
      font-size: 64px;
      margin: 20px 0;
      font-weight: bold;
    }

    .option {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      font-size: 20px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,.15);
      color: #fff;
      cursor: pointer;
    }

    .option:active {
      background: rgba(255,255,255,.3);
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <div>🎮 Rəqəmlər (demo)</div>
      <div>Xal: <b id="score">0</b></div>
    </div>

    <div id="question">?</div>

    <div id="options"></div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
