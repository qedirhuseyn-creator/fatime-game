<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fatimə – Rəqəmlər Oyunu</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #162b5a, #0b1630);
      color: #fff;
    }

    .app {
      max-width: 480px;
      margin: auto;
      padding: 20px;
    }

    .pill {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      padding: 8px 14px;
      border-radius: 20px;
      margin: 4px;
      font-size: 14px;
    }

    .card {
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      text-align: center;
    }

    .number {
      font-size: 72px;
      margin: 20px 0;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      font-size: 20px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.18);
      color: white;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="pill">🎮 Rəqəmlər (demo)</div>
    <div class="pill">Xal: <b id="score">0</b></div>

    <div class="card">
      <div id="question">Bu neçədir?</div>
      <div id="value" class="number">—</div>

      <button class="option">—</button>
      <button class="option">—</button>
      <button class="option">—</button>

      <div id="hint" style="margin-top:10px;opacity:.8"></div>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
